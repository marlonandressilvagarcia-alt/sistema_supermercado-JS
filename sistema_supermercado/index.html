<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Supermercado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛒 Mi Supermercado</h1>
        
        <div class="seccion">
            <h2>Productos Disponibles</h2>
            <div id="productosLista" class="productos-grid"></div>
        </div>

        <div class="seccion">
            <h2>Carrito de Compras</h2>
            <div id="carritoLista" class="carrito-items"></div>
            
            <div class="carrito-resumen">
                <p>Cantidad de productos: <span id="totalCantidad">0</span></p>
                <p>Total a pagar: $<span id="totalPrecio">0.00</span></p>
                <button id="limpiarCarrito">Limpiar Carrito</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
